    <main>
        <h3> Default max number is 100 with 10 tries! </h3>
        <button onclick="start()" id="gennum">Generate Random Number</button>
        <!-- <div id="inputfields">
            
        </div> -->
        <div id="inputfields">
                <h2> Your guess: </h2>
                <input type="number" id="guessednum" min="0" required><br>
                <button onclick="handleGuess()" id="checkbutton">Check</button>
        </div>

        <div id="upordown">
            <p id="guessishigherthannumber">?</p>
            <p id="guessednumber">?</p>
            <p id="guessislowerthannumber">?</p>
        </div>
        <p id="msgBox"></p>
    </main>
